# SKEIN — Structural Knowledge and Enterprise Intelligence Network
# Configuration File
# ================================================
# Priority: environment variables > this file > class defaults
#
# All env-var equivalents are noted inline (prefix: LLM_*, SKEIN_*, AGENT_*)
# Copy to config/local.yaml for local overrides (local.yaml is gitignored)

# ── LLM Provider ──────────────────────────────────────────────────────────────
# Default: Ollama (local, no API key, completely free)
# Env: LLM_PROVIDER, LLM_MODEL, LLM_BASE_URL, LLM_API_KEY
# Env: LLM_TEMPERATURE, LLM_MAX_TOKENS, LLM_TIMEOUT

llm:
  provider:         ollama                       # ollama | anthropic | openai | azure
  model:            llama3.1                     # model name per provider
  base_url:         http://localhost:11434        # Ollama or Azure endpoint
  api_key:          null                          # set via env LLM_API_KEY (never commit)
  temperature:      0.1                           # lower = more deterministic
  max_tokens:       2048
  timeout_seconds:  120
  max_retries:      3                             # retry attempts per LLM call
  retry_backoff_seconds: 2.0                      # initial backoff (doubles each retry)

  # ── Switch to Anthropic Claude ──────────────────────────────────────────────
  # provider:  anthropic
  # model:     claude-sonnet-4-6
  # api_key:   ${ANTHROPIC_API_KEY}               # set via environment variable

  # ── Switch to OpenAI GPT-4o ─────────────────────────────────────────────────
  # provider:  openai
  # model:     gpt-4o
  # api_key:   ${OPENAI_API_KEY}

  # ── Switch to Azure OpenAI ───────────────────────────────────────────────────
  # provider:  azure
  # model:     gpt-4o
  # base_url:  https://your-instance.openai.azure.com/
  # api_key:   ${AZURE_OPENAI_API_KEY}

# ── Reasoning Strategy ─────────────────────────────────────────────────────────
# Controls which reasoning pattern agents use.
# Env: SKEIN_REASONING_STRATEGY

reasoning:
  strategy:          structured         # chain_of_thought | react | plan_and_execute | structured
  enable_langchain:  false              # true → pip install langchain langchain-core
  enable_langgraph:  false              # true → pip install langgraph
  enable_crewai:     false              # true → pip install crewai

# ── Resilience ─────────────────────────────────────────────────────────────────
# Circuit breaker and retry configuration per LLM provider.
# Env: SKEIN_CIRCUIT_FAILURE_THRESHOLD, SKEIN_CIRCUIT_RECOVERY_SECONDS

resilience:
  circuit_breaker:
    failure_threshold:   5              # failures in window before circuit opens
    recovery_timeout_s:  30.0           # seconds before half-open probe
    window_size:         10             # rolling window for failure rate

  retry:
    max_attempts:        3
    initial_delay_s:     2.0
    backoff_factor:      2.0
    max_delay_s:         30.0
    jitter_factor:       0.2            # ±20% jitter to prevent thundering herd

# ── Orchestration ──────────────────────────────────────────────────────────────
# Env: SKEIN_MAX_WORKERS, SKEIN_WORKFLOW_TIMEOUT

orchestration:
  max_workers:                     4    # parallel task execution per workflow
  default_task_timeout_seconds:  300    # per-task timeout
  default_workflow_timeout_seconds: 600

# ── Agent Pool ─────────────────────────────────────────────────────────────────
# Controls agent instance pooling and back-pressure.
# Env: SKEIN_POOL_MIN_SIZE, SKEIN_POOL_MAX_SIZE, SKEIN_POOL_ACQUIRE_TIMEOUT

agent_pool:
  min_size:          1                  # warm-standby agents per type
  max_size:          10                 # hard cap — back-pressure beyond this
  acquire_timeout_s: 30.0               # PoolExhaustedError after this

# ── Memory ──────────────────────────────────────────────────────────────────────
# Env: SKEIN_MEMORY_MAX_ENTRIES, SKEIN_INSTITUTIONAL_MEMORY_PATH

memory:
  working_memory_max_entries:   50000   # LRU eviction above this limit
  institutional_memory_path:    null    # null = in-memory only
  # institutional_memory_path: data/institutional_knowledge.json

# ── Governance ─────────────────────────────────────────────────────────────────
# Hash-chained JSONL audit logs. Set log_dir to enable.
# Env: SKEIN_GOVERNANCE_LOG_DIR

governance:
  log_dir: logs/governance              # null to disable
  # Four streams written:
  #   logs/governance/executions.jsonl  — every agent.run() call
  #   logs/governance/decisions.jsonl   — DecisionAgent authority records
  #   logs/governance/escalations.jsonl — human escalation events
  #   logs/governance/audit.jsonl       — general audit trail

# ── Observability ──────────────────────────────────────────────────────────────
# Env: SKEIN_HEALTH_PORT, SKEIN_LOG_LEVEL, SKEIN_LOG_JSON

observability:
  health_port:  8080                    # /health /ready /metrics /status
  log_level:    INFO                    # DEBUG | INFO | WARNING | ERROR
  log_json:     false                   # true = structured JSON (production)
                                        # false = human-readable (development)

# ── Security ───────────────────────────────────────────────────────────────────
# Env: SECURITY_MAX_INPUT_LEN, SECURITY_RATE_LIMIT_RPM, SECURITY_PII_REDACT

security:
  enable_input_sanitisation:  true
  enable_pii_redaction:       true
  max_input_length:           50000
  max_output_length:          20000
  max_json_depth:             10
  rate_limit_requests_per_minute: 60

# ── Agent Defaults ─────────────────────────────────────────────────────────────
# Env: AGENT_DRY_RUN, AGENT_VERBOSE, AGENT_TRACE_DIR

agent:
  dry_run:         false                # true = DryRunReasoningEngine (no LLM calls)
  verbose_logging: false
  trace_dir:       null                 # null to disable per-run trace files
